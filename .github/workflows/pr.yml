name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Branch plan must be deleted before merge
        run: |
          test ! -f BRANCH.md || { echo '::error::BRANCH.md still exists - migrate it into the PR summary + changesets, then delete.'; exit 1; }
          test ! -f PLAN.md || { echo '::error::PLAN.md still exists (legacy name) - same rule as BRANCH.md.'; exit 1; }

      - uses: ./.github/actions/setup

      - run: bun run test

      - run: bun run build

      - name: Changeset reminder
        continue-on-error: true
        run: bunx changeset status --since origin/main

      - name: Pack validation
        continue-on-error: true
        run: |
          for pkg in mvc react; do
            (cd packages/$pkg && npm publish --dry-run)
          done
