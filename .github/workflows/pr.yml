name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Branch plan reminder
        run: |
          test ! -f BRANCH.md || echo '::warning::BRANCH.md present - before merge, migrate it into the PR summary + changesets and delete it.'
          test ! -f PLAN.md || echo '::warning::PLAN.md present (legacy name) - same rule as BRANCH.md.'

      - uses: ./.github/actions/setup

      - run: bun run test

      - run: bun run build

      - name: Changeset reminder
        continue-on-error: true
        run: bunx changeset status --since origin/main

      - name: Pack validation
        continue-on-error: true
        run: |
          for pkg in mvc react; do
            (cd packages/$pkg && npm publish --dry-run)
          done
