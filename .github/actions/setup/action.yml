name: Setup
description: Install bun + Node and install dependencies

inputs:
  registry-url:
    description: npm registry URL (only needed for publish jobs)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: ${{ inputs.registry-url }}

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
