[test]
# Convenience composer for `bun test` from the repo root. The canonical setup
# now lives in each package's own test.setup.ts; this file just preloads them
# in dependency order so the matchers/hooks register before any test file runs.
preload = ["./packages/react/test.setup.ts"]
coverage = true
coverageReporter = ["text"]
coveragePathIgnorePatterns = [
  "node_modules",
  "dist",
  "test\\.",
  "\\.test\\.",
  "packages/[^/]+/src/index\\.ts$",
  "examples",
  "website",
  "packages/router",
  "packages/solid"
]
coverageThreshold = { lines = 1.0, functions = 1.0, statements = 1.0 }
