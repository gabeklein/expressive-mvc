[test]
# Convenience composer for `bun test` from the repo root. The canonical setup
# now lives in each package's own test.setup.ts; this file just preloads the
# DOM bootstrap and the react setup (which transitively brings the state
# setup) in the same order as packages/react/bunfig.toml.
preload = ["./packages/react/test.dom.ts", "./packages/react/test.setup.ts"]
coverage = true
coverageReporter = ["text"]
coveragePathIgnorePatterns = [
  "node_modules",
  "dist",
  "test\\.",
  "\\.test\\.",
  "packages/[^/]+/src/index\\.ts$",
  "examples",
  "website",
  "packages/router",
  "packages/solid"
]
coverageThreshold = { lines = 1.0, functions = 1.0, statements = 1.0 }
